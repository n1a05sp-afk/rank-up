<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Boost Mobile - Firebase Live</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --container-bg: #121722;
            --card-bg: #1a2232;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #64748b;
            --border-color: #2e3d56;
            --danger-color: #ff3366;
            --warning-color: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%;
            background-color: var(--container-bg);
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        header h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 8px rgba(0,255,204,0.5);
        }

        .app-page {
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            padding: 20px;
            display: none;
        }

        .app-page.active {
            display: block;
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 600;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px;
            background-color: #0b0e14;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            -webkit-appearance: none;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #0b0e14;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,204,0.2);
        }

        button.secondary {
            background-color: #2e3d56;
            border: 1px solid #475d82;
            color: #fff;
            box-shadow: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .table-wrapper {
            overflow-x: auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: rgba(0, 255, 204, 0.05);
            color: var(--accent-color);
            font-weight: 600;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge.success { background-color: rgba(0, 255, 204, 0.15); color: var(--accent-color); box-shadow: 0 0 5px rgba(0,255,204,0.3); }
        .badge.none { background-color: #2e3d56; color: var(--text-muted); }

        .action-btn {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            display: inline-block;
            margin-right: 2px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .action-btn.edit { background-color: var(--warning-color); color: #000; }
        .action-btn.delete { background-color: var(--danger-color); color: #fff; }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: rgba(18, 23, 34, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            background: none;
            border: none;
            padding: 0;
            height: 100%;
        }

        .tab-item.active {
            color: var(--accent-color);
            text-shadow: 0 0 5px rgba(0,255,204,0.4);
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .live-status {
            text-align: center;
            font-size: 12px;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // なぎささん専用Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBKe7D1PTo1RjpmiwXEZLy59GS2Pcl-f7o",
            authDomain: "poker-boost.firebaseapp.com",
            databaseURL: "https://poker-boost-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "poker-boost",
            storageBucket: "poker-boost.firebasestorage.app",
            messagingSenderId: "992006646965",
            appId: "1:992006646965:web:0f67d46d1b1a79895a22fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.players = [];
        window.logs = [];

        // リアルタイムデータ受信
        onValue(ref(db, 'poker_data'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Firebaseから取得したデータを配列に変換する際、Firebase内の「キー(一意識別名)」を保持する
                if (data.players) {
                    window.players = Object.keys(data.players).map(key => {
                        return { ...data.players[key], firebaseKey: key };
                    });
                } else {
                    window.players = [];
                }

                if (data.logs) {
                    window.logs = Object.keys(data.logs).map(key => {
                        return { ...data.logs[key], firebaseKey: key };
                    });
                } else {
                    window.logs = [];
                }
            } else {
                window.players = [];
                window.logs = [];
            }
            window.updateApp();
        });

        window.dbSavePlayer = function(playerData) {
            const newPlayerRef = push(ref(db, 'poker_data/players'));
            playerData.id = newPlayerRef.key;
            set(newPlayerRef, playerData);
        };

        window.dbUpdatePlayer = function(playerId, updatedData) {
            const player = window.players.find(p => p.id === playerId);
            if (player && player.firebaseKey) {
                updatedData.id = playerId;
                set(ref(db, `poker_data/players/${player.firebaseKey}`), updatedData);
            }
        };

        window.dbSaveLog = function(logData) {
            const newLogRef = push(ref(db, 'poker_data/logs'));
            logData.id = newLogRef.key;
            set(newLogRef, logData);
        };

        window.dbUpdateLog = function(logId, updatedData) {
            const log = window.logs.find(l => l.id === logId);
            if (log && log.firebaseKey) {
                updatedData.id = logId;
                set(ref(db, `poker_data/logs/${log.firebaseKey}`), updatedData);
            }
        };

        // 【復活】特定のKO履歴をサーバーから完全に消去する関数
        window.dbDeleteLog = function(logId) {
            const log = window.logs.find(l => l.id === logId);
            if (log && log.firebaseKey) {
                remove(ref(db, `poker_data/logs/${log.firebaseKey}`));
            }
        };

        window.dbClearAll = function() {
            set(ref(db, 'poker_data'), null);
        };
    </script>
</head>
<body>

<header>
    <h1>POKER BOOST</h1>
    <div class="live-status">● REALTIME SYNC LIVE</div>
</header>

<div id="page-register" class="app-page active">
    <div class="card">
        <h2 id="player-form-title">1. プレイヤー登録</h2>
        <form id="player-form" onsubmit="savePlayer(event)">
            <input type="hidden" id="editing-player-id" value="">
            <div class="form-group">
                <label for="player-name">プレイヤー名</label>
                <input type="text" id="player-name" required placeholder="名前を入力">
            </div>
            <div class="form-group">
                <label for="player-level">レベル (1〜上限なし)</label>
                <input type="number" id="player-level" min="1" required placeholder="数値を入力">
            </div>
            <div class="btn-group">
                <button type="submit" id="player-submit-btn">プレイヤーを追加</button>
                <button type="button" id="player-cancel-btn" class="secondary" style="display:none;" onclick="cancelPlayerEditMode()">中止</button>
            </div>
        </form>
    </div>

    <h2>登録プレイヤー状況 (全員共通)</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>名前</th>
                    <th>Lv</th>
                    <th>ボーナス</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="player-table-body"></tbody>
        </table>
    </div>
</div>

<div id="page-ko" class="app-page">
    <div class="card">
        <h2 id="ko-form-title">2. KO記録 (ノックアウト)</h2>
        <form id="ko-form" onsubmit="recordKO(event)">
            <input type="hidden" id="editing-log-id" value="">
            <div class="form-group">
                <label for="ko-killer">勝者 (Killer / 飛ばした人)</label>
                <select id="ko-killer" required onchange="filterSelectOptions()">
                    <option value="">勝者を選択</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ko-victim">敗者 (Victim / 飛ばされた人)</label>
                <select id="ko-victim" required onchange="filterSelectOptions()">
                    <option value="">敗者を選択</option>
                </select>
            </div>
            <div class="btn-group">
                <button type="submit" id="ko-submit-btn">KOを記録</button>
                <button type="button" id="ko-cancel-btn" class="secondary" style="display:none;" onclick="cancelEditMode()">中止</button>
            </div>
        </form>
    </div>

    <h2>KO履歴ログ (全員共通)</h2>
    <div class="table-wrapper" style="margin-bottom: 20px;">
        <table>
            <thead>
                <tr>
                    <th>勝者(Lv) vs 敗者(Lv)</th>
                    <th>判定</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="log-table-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>データ管理</h2>
        <div class="system-ops" style="display: flex; flex-direction: column; gap: 10px;">
            <button class="action-btn delete" style="width: 100%; padding: 14px; margin: 0; font-size: 15px;" onclick="clearAllData()">サーバーの全データをリセット</button>
        </div>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-item active" id="tab-register" onclick="switchPage('register')">
        <div class="tab-icon">👤</div>
        <div>プレイヤー登録</div>
    </button>
    <button class="tab-item" id="tab-ko" onclick="switchPage('ko')">
        <div class="tab-icon">🎯</div>
        <div>KO記録・ログ</div>
    </button>
</div>

<script>
    function switchPage(pageName) {
        document.getElementById('page-register').classList.remove('active');
        document.getElementById('page-ko').classList.remove('active');
        document.getElementById('tab-register').classList.remove('active');
        document.getElementById('tab-ko').classList.remove('active');

        if (pageName === 'register') {
            document.getElementById('page-register').classList.add('active');
            document.getElementById('tab-register').classList.add('active');
        } else if (pageName === 'ko') {
            document.getElementById('page-ko').classList.add('active');
            document.getElementById('tab-ko').classList.add('active');
            renderSelectOptions();
        }
    }

    function savePlayer(event) {
        event.preventDefault();
        const nameInput = document.getElementById('player-name');
        const levelInput = document.getElementById('player-level');
        const editingPlayerId = document.getElementById('editing-player-id').value;

        const playerData = {
            name: nameInput.value.trim(),
            level: parseInt(levelInput.value, 10)
        };

        if (editingPlayerId) {
            window.dbUpdatePlayer(editingPlayerId, playerData);
            cancelPlayerEditMode();
        } else {
            window.dbSavePlayer(playerData);
        }

        nameInput.value = '';
        levelInput.value = '';
    }

    function editPlayer(playerId) {
        const player = window.players.find(p => p.id === playerId);
        if (!player) return;

        document.getElementById('editing-player-id').value = player.id;
        document.getElementById('player-name').value = player.name;
        document.getElementById('player-level').value = player.level;

        document.getElementById('player-form-title').innerText = "1. プレイヤー情報の編集";
        document.getElementById('player-submit-btn').innerText = "情報を更新する";
        document.getElementById('player-cancel-btn').style.display = "inline-block";
        window.scrollTo(0, 0);
    }

    function cancelPlayerEditMode() {
        document.getElementById('editing-player-id').value = "";
        document.getElementById('player-form').reset();
        document.getElementById('player-form-title').innerText = "1. プレイヤー登録";
        document.getElementById('player-submit-btn').innerText = "プレイヤーを追加";
        document.getElementById('player-cancel-btn').style.display = "none";
    }

    function recordKO(event) {
        event.preventDefault();
        const killerId = document.getElementById('ko-killer').value;
        const victimId = document.getElementById('ko-victim').value;
        const editingId = document.getElementById('editing-log-id').value;

        const logData = {
            killerId: killerId,
            victimId: victimId
        };

        if (editingId) {
            window.dbUpdateLog(editingId, logData);
            cancelEditMode();
        } else {
            window.dbSaveLog(logData);
        }

        document.getElementById('ko-form').reset();
    }

    function editLog(logId) {
        const log = window.logs.find(l => l.id === logId);
        if (!log) return;

        document.getElementById('editing-log-id').value = log.id;
        
        renderSelectOptions();
        document.getElementById('ko-killer').value = log.killerId;
        document.getElementById('ko-victim').value = log.victimId;
        filterSelectOptions();

        document.getElementById('ko-form-title').innerText = "2. KO記録の編集";
        document.getElementById('ko-submit-btn').innerText = "変更を保存";
        document.getElementById('ko-cancel-btn').style.display = "inline-block";
        window.scrollTo(0, 0);
    }

    function cancelEditMode() {
        document.getElementById('editing-log-id').value = "";
        document.getElementById('ko-form').reset();
        document.getElementById('ko-form-title').innerText = "2. KO記録 (ノックアウト)";
        document.getElementById('ko-submit-btn').innerText = "KOを記録";
        document.getElementById('ko-cancel-btn').style.display = "none";
        renderSelectOptions();
    }

    // 【復活】ログ消去のアラームと実行処理
    function deleteLog(logId) {
        if(confirm("このKO履歴を削除しますか？\n（勝者の％ボーナスも自動でマイナスされます）")) {
            window.dbDeleteLog(logId);
        }
    }

    function renderSelectOptions() {
        const killerSelect = document.getElementById('ko-killer');
        const victimSelect = document.getElementById('ko-victim');
        const curK = killerSelect.value;
        const curV = victimSelect.value;

        let kHtml = '<option value="">勝者を選択</option>';
        let vHtml = '<option value="">敗者を選択</option>';
        
        (window.players || []).forEach(p => {
            kHtml += `<option value="${p.id}">${p.name} (Lv.${p.level})</option>`;
            vHtml += `<option value="${p.id}">${p.name} (Lv.${p.level})</option>`;
        });

        killerSelect.innerHTML = kHtml;
        victimSelect.innerHTML = vHtml;
        killerSelect.value = curK;
        victimSelect.value = curV;
    }

    function filterSelectOptions() {
        const killerSelect = document.getElementById('ko-killer');
        const victimSelect = document.getElementById('ko-victim');
        const selectedKiller = killerSelect.value;
        const selectedVictim = victimSelect.value;

        Array.from(killerSelect.options).forEach(opt => {
            if (opt.value === "") return;
            opt.style.display = (opt.value === selectedVictim) ? "none" : "block";
        });

        Array.from(victimSelect.options).forEach(opt => {
            if (opt.value === "") return;
            opt.style.display = (opt.value === selectedKiller) ? "none" : "block";
        });
    }

    window.updateApp = function() {
        renderSelectOptions();
        filterSelectOptions();

        const playerStats = {};
        (window.players || []).forEach(p => {
            playerStats[p.id] = { bonus: 0, koCount: 0 };
        });

        (window.logs || []).forEach(log => {
            const killer = window.players.find(p => p.id === log.killerId);
            const victim = window.players.find(p => p.id === log.victimId);
            if (!killer || !victim) return;

            // 格上撃破ボーナスの判定
            if (killer.level < victim.level) {
                if (playerStats[killer.id]) {
                    playerStats[killer.id].bonus += 5;
                    playerStats[killer.id].koCount += 1;
                }
            }
        });

        const playerTableBody = document.getElementById('player-table-body');
        playerTableBody.innerHTML = '';
        if (!window.players || window.players.length === 0) {
            playerTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">登録プレイヤーなし</td></tr>';
        } else {
            window.players.forEach(p => {
                const stats = playerStats[p.id] || { bonus: 0, koCount: 0 };
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${p.name}</strong></td>
                    <td>${p.level}</td>
                    <td><span style="color: ${stats.bonus > 0 ? 'var(--accent-color)' : '#fff'}; font-weight:bold;">+${stats.bonus}%</span></td>
                    <td>
                        <button class="action-btn edit" onclick="editPlayer('${p.id}')">編集</button>
                    </td>
                `;
                playerTableBody.appendChild(row);
            });
        }

        const logTableBody = document.getElementById('log-table-body');
        logTableBody.innerHTML = '';
        if (!window.logs || window.logs.length === 0) {
            logTableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">ログなし</td></tr>';
        } else {
            [...window.logs].reverse().forEach(log => {
                const killer = window.players.find(p => p.id === log.killerId);
                const victim = window.players.find(p => p.id === log.victimId);

                const kText = killer ? `${killer.name}(${killer.level})` : '不明';
                const vText = victim ? `${victim.name}(${victim.level})` : '不明';
                const isBonus = killer && victim && killer.level < victim.level;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <span style="color:var(--accent-color);font-weight:500;">${kText}</span><br>
                        <span style="color:var(--text-muted);font-size:12px;">↳ 撃破: ${vText}</span>
                    </td>
                    <td>${isBonus ? '<span class="badge success">+5%</span>' : '<span class="badge none">--</span>'}</td>
                    <td>
                        <button class="action-btn edit" onclick="editLog('${log.id}')">編集</button>
                        <button class="action-btn delete" onclick="deleteLog('${log.id}')">削除</button>
                    </td>
                `;
                logTableBody.appendChild(row);
            });
        }
    }

    function clearAllData() {
        if (confirm("本当に【サーバーの全データ】をリセットしますか？\n他のスタッフの画面からも同時に消去されます。")) {
            window.dbClearAll();
            cancelPlayerEditMode();
            cancelEditMode();
        }
    }
</script>
</body>
</html>
